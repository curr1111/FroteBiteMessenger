<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>FroteBiteMessenger — Вход</title>
  <link rel="stylesheet" href="brand.css"/>
</head>
<body class="theme-ember">
  <div class="fade-in"></div>

  <div class="auth-wrap">
    <div class="auth panel">
      <div class="auth-left">
        <div class="brand">
          <img src="logo.svg" alt="FroteBite"/>
          <div class="brand-title">
            <div class="name">FroteBiteMessenger</div>
            <div class="sub">Вход</div>
          </div>
        </div>

        <h1>Войти</h1>
        <p>Введи почту и пароль — и ты в чатах.</p>

        <div class="helper">
          Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
        </div>
      </div>

      <div class="auth-right">
        <form id="loginForm">
          <div class="field">
            <label>Почта</label>
            <input id="logEmail" class="input" type="email" placeholder="you@mail.com" autocomplete="email" required/>
          </div>

          <div class="field">
            <label>Пароль</label>
            <input id="logPass" class="input" type="password" placeholder="********" autocomplete="current-password" required/>
          </div>

          <div class="row">
            <button class="btn primary" type="submit">Войти</button>
            <button class="btn" type="button" id="toRegister">Регистрация</button>
          </div>

          <div id="logErr" class="error"></div>
        </form>
      </div>
    </div>
  </div>

  <script src="brand.js"></script>
  <script>FB.initAuthPage("login");</script>
</body>
</html>
