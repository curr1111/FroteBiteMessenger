<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Войти — FroteBiteMessenger</title>
  <link rel="stylesheet" href="./brand.css" />
</head>
<body class="theme-ember">
  <div class="bg"></div>

  <header class="topbar">
    <div class="brand">
      <div class="logo"><span class="logo-f">F</span><span class="logo-flame"></span></div>
      <div class="brand-text">
        <div class="brand-name">FroteBiteMessenger</div>
        <div class="brand-sub">Sign in</div>
      </div>
    </div>
  </header>

  <main class="auth">
    <section class="auth-card glass">
      <div class="auth-title">Войти</div>
      <div class="auth-sub">Введи почту и пароль.</div>

      <div class="auth-row">
        <input id="email" class="input" placeholder="Почта" autocomplete="email">
        <input id="pass" class="input" placeholder="Пароль" type="password" autocomplete="current-password">
        <button id="go" class="btn">Войти</button>
      </div>

      <div id="err" class="err" hidden></div>

      <div class="auth-links">
        Нет аккаунта? <a href="./register.html">Зарегистрироваться</a>
      </div>
    </section>
  </main>

  <script>
    const $ = (s)=>document.querySelector(s);
    const err = $("#err");

    $("#go").addEventListener("click", async () => {
      err.hidden = true;
      const email = $("#email").value.trim();
      const password = $("#pass").value;

      try{
        const r = await fetch("/api/login", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ email, password })
        });
        const j = await r.json();
        if(!r.ok) throw new Error(j.error || "Ошибка");

        localStorage.setItem("fb_userId", String(j.userId));
        localStorage.setItem("fb_email", j.email);
        localStorage.setItem("fb_nickname", j.nickname || "");
        location.href = "./chat.html";
      }catch(e){
        err.textContent = e.message;
        err.hidden = false;
      }
    });
  </script>
</body>
</html>
