<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Чаты — FroteBiteMessenger</title>
  <link rel="stylesheet" href="./brand.css" />
</head>

<body class="theme-ember">
  <div class="bg"></div>

  <header class="topbar">
    <div class="brand">
      <div class="logo"><span class="logo-f">F</span><span class="logo-flame"></span></div>
      <div class="brand-text">
        <div class="brand-name">FroteBiteMessenger</div>
        <div class="brand-sub">Chats</div>
      </div>
    </div>

    <div class="top-actions" style="display:flex; gap:10px;">
      <button id="btnProfile" class="btn pill">Ваш профиль</button>
      <button id="btnLogout" class="btn pill ghost">Выйти</button>
    </div>
  </header>

  <main class="shell">
    <section class="card glass">
      <div style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; padding:6px 6px 14px;">
        <div class="section-hint">Тема приложения:</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn small ghost themeBtn" data-theme="ember">Ember</button>
          <button class="btn small ghost themeBtn" data-theme="sunset">Sunset</button>
          <button class="btn small ghost themeBtn" data-theme="midnight">Midnight</button>
          <button class="btn small ghost themeBtn" data-theme="aurora">Aurora</button>
        </div>
      </div>

      <div class="layout">
        <aside class="left">
          <div class="left-head">
            <div>
              <div class="left-title">Диалоги</div>
              <div class="section-hint">Показываются только чаты с перепиской</div>
            </div>
            <button id="btnAdd" class="btn small">+ Добавить</button>
          </div>

          <div class="search">
            <div class="section-hint" style="margin-bottom:8px;">Введите почту или ID</div>
            <div class="search-row">
              <input id="searchEmail" class="input" placeholder="почта" autocomplete="off" />
              <input id="searchId" class="input" placeholder="id" autocomplete="off" />
            </div>
            <div id="searchErr" class="search-err" hidden>Почта или айди введены неверно, никого не найдено</div>
          </div>

          <div id="usersList" class="users"></div>
        </aside>

        <section class="right">
          <!-- чат скрыт, пока никто не выбран -->
          <div id="chatWrap" class="chat-wrap" hidden>
            <div class="chat-head">
              <div class="chat-title" id="chatTitle">Диалог</div>
              <div class="chat-head-actions">
                <button id="btnCalls" class="btn small ghost">Позвонить</button>
                <button id="btnDone" class="btn small">Готово</button>
              </div>
            </div>

            <div id="messages" class="messages"></div>

            <div class="composer">
              <div id="formatBar" class="formatbar" hidden>
                <button class="fmt" data-fmt="b"><b>Жирный</b></button>
                <button class="fmt" data-fmt="i"><i>Курсив</i></button>
                <button class="fmt" data-fmt="u"><u>Подчеркнуть</u></button>
              </div>

              <textarea id="msgInput" class="textarea" placeholder="Напиши сообщение..."></textarea>

              <div id="replyBanner" class="replybox" hidden></div>

              <div class="composer-actions">
                <button id="btnRefresh" class="btn wide ghost">Обновить</button>
                <button id="btnSend" class="btn wide">Отправить</button>
              </div>
            </div>
          </div>

          <div id="callsWrap" class="calls-wrap" hidden>
            <div class="chat-head">
              <div class="chat-title">Звонки</div>
              <div class="chat-head-actions">
                <button id="btnBackToChats" class="btn small">Назад</button>
              </div>
            </div>
            <div style="padding:18px; color: var(--muted);">
              Пока без звука 🙂 Тут будет история звонков и кнопка «позвонить».
            </div>
          </div>
        </section>
      </div>
    </section>

    <nav class="bottomnav glass" aria-label="Навигация">
      <button class="navbtn active" data-view="chats">Чаты</button>
      <button class="navbtn" data-view="calls">Звонки</button>
    </nav>
  </main>

  <!-- Profile modal -->
  <div id="modal" class="modal" hidden>
    <div class="modal-card glass">
      <div class="modal-head">
        <div class="modal-title">Ваш профиль</div>
        <button id="modalClose" class="btn small ghost">✕</button>
      </div>

      <div class="profile">
        <div class="row">
          <div class="label">Почта</div>
          <div id="pEmail" class="value">—</div>
        </div>
        <div class="row">
          <div class="label">ID</div>
          <div id="pId" class="value">—</div>
        </div>
        <div class="row">
          <div class="label">Никнейм</div>
          <input id="pNick" class="input" placeholder="никнейм" />
        </div>
        <div class="row actions">
          <button id="pSave" class="btn wide">Изменить</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden>
    <div class="toast-card glass">
      <div id="toastText" class="toast-text">Новое сообщение</div>
      <div class="toast-bar"><div id="toastBarFill" class="toast-bar-fill"></div></div>
    </div>
  </div>

  <div id="ctx" class="ctx glass" hidden></div>

  <script src="./brand.js"></script>
</body>
</html>
