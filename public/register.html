<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FroteBiteMessenger — Регистрация</title>
  <link rel="stylesheet" href="brand.css" />
</head>
<body class="page auth-page" data-page="register">
  <div id="fadeOverlay" class="fade-overlay"></div>

  <header class="topbar auth-topbar">
    <div class="brand">
      <div class="logo" aria-label="FroteBite logo">
        <!-- Огонёк с F внутри (SVG, НЕ удаляем) -->
        <svg viewBox="0 0 64 64" class="logo-svg" role="img" aria-hidden="true">
          <defs>
            <linearGradient id="flameGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#ffb23c"/>
              <stop offset="0.55" stop-color="#ff6a00"/>
              <stop offset="1" stop-color="#ff2a2a"/>
            </linearGradient>
            <linearGradient id="fGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#ff3b3b"/>
              <stop offset="1" stop-color="#b30000"/>
            </linearGradient>
            <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feColorMatrix in="blur" type="matrix"
                values="1 0 0 0 0
                        0 0.7 0 0 0
                        0 0 0.2 0 0
                        0 0 0 0.9 0" result="glow"/>
              <feMerge>
                <feMergeNode in="glow"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <path filter="url(#softGlow)" fill="url(#flameGrad)"
                d="M36 6c2 10-6 12-6 18 0 4 3 6 3 10 0 5-6 7-6 13 0 7 6 11 13 11 10 0 18-7 18-19 0-13-10-18-11-33-5 5-7 10-11 0z"/>
          <circle cx="28.5" cy="40" r="15" fill="rgba(0,0,0,0.18)"/>
          <text x="23" y="46" font-size="22" font-weight="800" fill="url(#fGrad)"
                font-family="Segoe UI, 'Microsoft YaHei UI', 'Microsoft YaHei', sans-serif">F</text>
        </svg>
      </div>

      <div class="brand-text">
        <div class="brand-title">FroteBiteMessenger</div>
        <div class="brand-sub">Регистрация</div>
      </div>
    </div>
  </header>

  <main class="auth-main">
    <section class="auth-card glass">
      <h1 class="auth-title">Создай аккаунт</h1>
      <p class="auth-hint">Введи почту и пароль.</p>

      <form id="registerForm" class="form">
        <label class="field">
          <span class="label">Почта</span>
          <input id="regEmail" type="email" autocomplete="email" placeholder="example@gmail.com" required />
        </label>

        <label class="field">
          <span class="label">Пароль</span>
          <input id="regPass" type="password" autocomplete="new-password" placeholder="минимум 8 символов" minlength="8" required />
        </label>

        <button class="btn primary" type="submit">
          Зарегистрироваться
        </button>

        <div id="authError" class="auth-error" role="status" aria-live="polite"></div>
      </form>

      <div class="auth-switch">
        <span>Уже есть аккаунт?</span>
        <a class="link" href="login.html">Войти</a>
      </div>
    </section>
  </main>

  <script src="brand.js"></script>
</body>
</html>
