<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>FroteBiteMessenger — Регистрация</title>
  <link rel="stylesheet" href="brand.css"/>
</head>
<body class="theme-ember">
  <div class="fade-in"></div>

  <div class="auth-wrap">
    <div class="auth panel">
      <div class="auth-left">
        <div class="brand">
          <img src="logo.svg" alt="FroteBite"/>
          <div class="brand-title">
            <div class="name">FroteBiteMessenger</div>
            <div class="sub">Регистрация</div>
          </div>
        </div>

        <h1>Создай аккаунт</h1>
        <p>Почта + пароль. Данные хранятся в SQLite на сервере.</p>

        <div class="helper">
          Уже есть аккаунт? <a href="login.html">Войти</a>
        </div>
      </div>

      <div class="auth-right">
        <form id="registerForm">
          <div class="field">
            <label>Почта</label>
            <input id="regEmail" class="input" type="email" placeholder="you@mail.com" autocomplete="email" required/>
          </div>

          <div class="field">
            <label>Пароль (минимум 8 символов)</label>
            <input id="regPass" class="input" type="password" placeholder="********" autocomplete="new-password" required/>
          </div>

          <div class="row">
            <button class="btn primary" type="submit">Зарегистрироваться</button>
            <button class="btn" type="button" id="toLogin">Уже есть аккаунт</button>
          </div>

          <div id="regErr" class="error"></div>
        </form>
      </div>
    </div>
  </div>

  <script src="brand.js"></script>
  <script>FB.initAuthPage("register");</script>
</body>
</html>
